services:
  app:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - .env.production
    networks:
      - default
    depends_on:
      db:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.flowvory-http.entrypoints: web
      traefik.http.routers.flowvory-http.rule: Host(`${APP_HOST}`)
      traefik.http.routers.flowvory-http.middlewares: flowvory-redirect
      traefik.http.middlewares.flowvory-redirect.redirectscheme.scheme: https
      traefik.http.middlewares.flowvory-redirect.redirectscheme.permanent: "true"
      traefik.http.routers.flowvory.entrypoints: websecure
      traefik.http.routers.flowvory.rule: Host(`${APP_HOST}`)
      traefik.http.routers.flowvory.tls.certresolver: letsencrypt
      traefik.http.routers.flowvory.tls: "true"
      traefik.http.services.flowvory.loadbalancer.server.port: "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health?deep=1').then((response)=>{if(!response.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
